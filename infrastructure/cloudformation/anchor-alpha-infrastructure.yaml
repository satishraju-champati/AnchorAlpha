AWSTemplateFormatVersion: '2010-09-09'
Description: 'AnchorAlpha Momentum Screener Infrastructure - Lambda, S3, EventBridge, and Monitoring'

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Environment name
  
  FMPApiKey:
    Type: String
    NoEcho: true
    Description: Financial Modeling Prep API Key
  
  PerplexityApiKey:
    Type: String
    NoEcho: true
    Description: Perplexity API Key
  
  NotificationEmail:
    Type: String
    Description: Email address for budget and error notifications
    AllowedPattern: '^[^\s@]+@[^\s@]+\.[^\s@]+$'

Resources:
  # S3 Bucket for storing processed momentum data
  MomentumDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'anchor-alpha-momentum-data-${Environment}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldData
            Status: Enabled
            ExpirationInDays: 90
            NoncurrentVersionExpirationInDays: 30
      VersioningConfiguration:
        Status: Enabled

  # CloudWatch Log Group for S3 access logs
  S3AccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/s3/anchor-alpha-momentum-data-${Environment}'
      RetentionInDays: 30

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'AnchorAlpha-Lambda-ExecutionRole-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub 'arn:aws:s3:::anchor-alpha-momentum-data-${Environment}-${AWS::AccountId}/*'
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub 'arn:aws:s3:::anchor-alpha-momentum-data-${Environment}-${AWS::AccountId}'
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: 
                  - !Ref FMPApiKeySecret
                  - !Ref PerplexityApiKeySecret
        - PolicyName: SQSDeadLetterQueue
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt ErrorNotificationQueue.Arn
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/anchor-alpha-*'
  # Secrets Manager for API Keys
  FMPApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'anchor-alpha/fmp-api-key-${Environment}'
      Description: 'Financial Modeling Prep API Key for AnchorAlpha'
      SecretString: !Ref FMPApiKey

  PerplexityApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'anchor-alpha/perplexity-api-key-${Environment}'
      Description: 'Perplexity API Key for AnchorAlpha'
      SecretString: !Ref PerplexityApiKey

  # Lambda Function
  MomentumProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'anchor-alpha-momentum-processor-${Environment}'
      Runtime: python3.11
      Handler: AnchorAlpha.lambda_function.handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Sub 'anchor-alpha-lambda-code-${AWS::AccountId}'
        S3Key: 'lambda-deployment.zip'
      Timeout: 900  # 15 minutes
      MemorySize: 1024
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          S3_BUCKET: !Ref MomentumDataBucket
          FMP_API_KEY_SECRET: !Ref FMPApiKeySecret
          PERPLEXITY_API_KEY_SECRET: !Ref PerplexityApiKeySecret
      DeadLetterConfig:
        TargetArn: !GetAtt ErrorNotificationQueue.Arn

  # CloudWatch Log Group for Lambda
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/anchor-alpha-momentum-processor-${Environment}'
      RetentionInDays: 30

  # EventBridge Rule for Daily Execution
  DailyScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'anchor-alpha-daily-schedule-${Environment}'
      Description: 'Trigger momentum processing daily after market close'
      ScheduleExpression: 'cron(30 21 ? * MON-FRI *)'  # 9:30 PM UTC (4:30 PM EST) on weekdays
      State: ENABLED
      Targets:
        - Arn: !GetAtt MomentumProcessorFunction.Arn
          Id: MomentumProcessorTarget
          Input: !Sub |
            {
              "source": "eventbridge",
              "environment": "${Environment}",
              "trigger_time": "daily_schedule"
            }

  # Permission for EventBridge to invoke Lambda
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MomentumProcessorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DailyScheduleRule.Arn

  # SNS Topic for Notifications
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'anchor-alpha-notifications-${Environment}'
      DisplayName: 'AnchorAlpha System Notifications'

  # SNS Subscription for Email Notifications
  EmailNotificationSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      TopicArn: !Ref NotificationTopic
      Endpoint: !Ref NotificationEmail

  # SQS Dead Letter Queue for Failed Lambda Executions
  ErrorNotificationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'anchor-alpha-errors-${Environment}'
      MessageRetentionPeriod: 1209600  # 14 days
      VisibilityTimeout: 60

  # CloudWatch Alarm for Lambda Errors
  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'AnchorAlpha-Lambda-Errors-${Environment}'
      AlarmDescription: 'Alert when Lambda function has errors'
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref MomentumProcessorFunction
      AlarmActions:
        - !Ref NotificationTopic

  # CloudWatch Alarm for Lambda Duration
  LambdaDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'AnchorAlpha-Lambda-Duration-${Environment}'
      AlarmDescription: 'Alert when Lambda function takes too long'
      MetricName: Duration
      Namespace: AWS/Lambda
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 600000  # 10 minutes in milliseconds
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref MomentumProcessorFunction
      AlarmActions:
        - !Ref NotificationTopic

  # AWS Budget for Cost Control
  MonthlyCostBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub 'AnchorAlpha-Monthly-Budget-${Environment}'
        BudgetLimit:
          Amount: 10
          Unit: USD
        TimeUnit: MONTHLY
        BudgetType: COST
        CostFilters:
          TagKeyValue:
            - "Project$AnchorAlpha"
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref NotificationEmail
        - Notification:
            NotificationType: FORECASTED
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref NotificationEmail

Outputs:
  S3BucketName:
    Description: 'Name of the S3 bucket for momentum data'
    Value: !Ref MomentumDataBucket
    Export:
      Name: !Sub '${AWS::StackName}-S3Bucket'

  LambdaFunctionArn:
    Description: 'ARN of the Lambda function'
    Value: !GetAtt MomentumProcessorFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaArn'

  LambdaFunctionName:
    Description: 'Name of the Lambda function'
    Value: !Ref MomentumProcessorFunction
    Export:
      Name: !Sub '${AWS::StackName}-LambdaName'

  NotificationTopicArn:
    Description: 'ARN of the SNS notification topic'
    Value: !Ref NotificationTopic
    Export:
      Name: !Sub '${AWS::StackName}-NotificationTopic'

  FMPApiKeySecretArn:
    Description: 'ARN of the FMP API Key secret'
    Value: !Ref FMPApiKeySecret
    Export:
      Name: !Sub '${AWS::StackName}-FMPSecret'

  PerplexityApiKeySecretArn:
    Description: 'ARN of the Perplexity API Key secret'
    Value: !Ref PerplexityApiKeySecret
    Export:
      Name: !Sub '${AWS::StackName}-PerplexitySecret'

  EventBridgeRuleArn:
    Description: 'ARN of the EventBridge rule'
    Value: !GetAtt DailyScheduleRule.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ScheduleRule'