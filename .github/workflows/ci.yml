name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        python -m pytest tst/ -v --cov=src/AnchorAlpha --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy
    
    - name: Run linting
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check src/
        isort --check-only src/
        mypy src/ --ignore-missing-imports

  build-lambda:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
    
    - name: Build Lambda deployment package
      run: |
        mkdir -p build/lambda
        pip install -r requirements.txt -t build/lambda/
        cp -r src/AnchorAlpha build/lambda/
        cp -r cfg build/lambda/
        cd build/lambda && zip -r ../lambda-deployment.zip .
    
    - name: Upload Lambda artifact
      uses: actions/upload-artifact@v3
      with:
        name: lambda-deployment
        path: build/lambda-deployment.zip

  deploy-lambda:
    runs-on: ubuntu-latest
    needs: build-lambda
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
    
    - name: Download Lambda artifact
      uses: actions/download-artifact@v3
      with:
        name: lambda-deployment
        path: build/
    
    - name: Deploy Lambda function
      run: |
        aws lambda update-function-code \
          --function-name anchoralpha-momentum-processor \
          --zip-file fileb://build/lambda-deployment.zip